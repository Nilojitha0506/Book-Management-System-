<div class="bg-wrapper">
 
  <div class="container">
    <h1>Welcome to Book Management System</h1>

    <div *ngIf="showAlert" class="alert-box" [ngClass]="alertType">
      <div>{{ alertMessage }}</div>
      <button class="alert-ok-btn" (click)="closeAlert()">OK</button>
    </div>

    <div class="add-button" (click)="openAddModal()">Add Book</div>

    <div class="table-responsive">
      <table class="book-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let b of books">
            <td>{{b.title}}</td>
            <td>{{b.author}}</td>
            <td>{{b.isbn}}</td>
            <td>{{b.publicationDate | date:'shortDate'}}</td>
            <td class="action-buttons">
              <button class="edit-btn" (click)="openEditModal(b)">Edit</button>
              <button class="delete-btn" (click)="deleteBook(b.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="modal" *ngIf="addModal">
      <div class="modal-content">
        <h2>Add New Book</h2>
        <form (ngSubmit)="saveNewBook()">
          <input [(ngModel)]="newBook.title" name="title" placeholder="Title" required>
          <input [(ngModel)]="newBook.author" name="author" placeholder="Author" required>
          <input [(ngModel)]="newBook.isbn" name="isbn" placeholder="ISBN" required>
          <input type="date" [(ngModel)]="newBook.publicationDate" name="publicationDate" required>
          <div class="modal-actions">
            <button type="submit" class="edit-btn">Save</button>
            <button type="button" class="delete-btn" (click)="closeAddModal()">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal" *ngIf="editingBook">
      <div class="modal-content">
        <h2>Edit Book</h2>
        <form (ngSubmit)="saveEdit()">
          <input [(ngModel)]="editingBook.title" name="title" required>
          <input [(ngModel)]="editingBook.author" name="author" required>
          <input [(ngModel)]="editingBook.isbn" name="isbn">
          <input type="date" [(ngModel)]="editingBook.publicationDate" name="publicationDate">
          <div class="modal-actions">
            <button type="submit" class="edit-btn">Save</button>
            <button type="button" class="delete-btn" (click)="closeEditModal()">Cancel</button>
          </div>
        </form>
      </div>
    </div>
    
    <div class="modal" *ngIf="showDeleteConfirm">
      <div class="modal-content">
        <h2>Confirm Delete</h2>
        <p>Are you sure you want to delete this book?</p>
        <div class="modal-actions">
          <button class="delete-btn" (click)="confirmDelete()">Yes</button>
          <button class="edit-btn" (click)="closeDeleteConfirm()">No</button>
        </div>
      </div>
    </div>
  </div>
</div>
